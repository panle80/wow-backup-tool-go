name: Build
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Copy icon
        run: Copy-Item huifubeifen.png build/appicon.png -Force

      - name: Build Windows
        run: wails build -platform windows/amd64 -clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoWBackupTool-Windows
          path: build/bin/WoWBackupTool.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Copy icon
        run: cp huifubeifen.png build/appicon.png

      - name: Build macOS (Apple Silicon arm64)
        run: wails build -platform darwin/arm64 -clean

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoWBackupTool-macOS-AppleSilicon
          path: build/bin/WoWBackupTool

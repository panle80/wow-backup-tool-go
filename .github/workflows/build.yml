name: Build
on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Prepare icon
        run: |
          New-Item -ItemType Directory -Force -Path build
          Copy-Item huifubeifen.png build/appicon.png -Force

      - name: Build Windows
        run: wails build -platform windows/amd64 -clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoWBackupTool-Windows
          path: build/bin/WoWBackupTool.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Prepare icon
        run: |
          mkdir -p build
          cp huifubeifen.png build/appicon.png

      - name: Build macOS (Apple Silicon arm64)
        run: wails build -platform darwin/arm64 -clean

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoWBackupTool-macOS-AppleSilicon
          path: build/bin/*.app

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Zip macOS app
        run: |
          cd artifacts/WoWBackupTool-macOS-AppleSilicon
          zip -r ../../WoWBackupTool-macOS-AppleSilicon.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/WoWBackupTool-Windows/WoWBackupTool.exe
            WoWBackupTool-macOS-AppleSilicon.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
